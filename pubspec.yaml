name: bb_academy_hrms
description: Black Building Academy HRMS — Employee management mobile app powered by ERPNext / Frappe.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Routing
  go_router: ^14.2.7

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # JSON / models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  connectivity_plus: ^6.0.5
  flutter_dotenv: ^5.2.1
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/lottie/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
